# read-image 视觉 API 配置
# 独立于 Claude Code 主模型，确保读图始终可用
base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
model: "qwen3.5-omni-plus"
max_tokens: 4096

# 鉴权方式：@TOKEN@ 会被替换为 auth_token 的值
auth_header: "Authorization: Bearer @TOKEN@"
# 请替换为你的 DashScope API Key，格式如 sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
auth_token: "YOUR_DASHSCOPE_API_KEY"
